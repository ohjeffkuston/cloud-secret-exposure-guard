name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v
      - name: Exercise the example without exposing matched values
        run: PYTHONPATH=src python -m cloud_secret_exposure_guard examples/config-bundle.json

